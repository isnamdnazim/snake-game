name: Publish Web

on:
  push:
    branches:
      - develop
      - web-publish
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish web app
        shell: pwsh
        run: |
          dotnet publish SnakeGame.Web -c Release -o publish
          $indexPath = "publish/wwwroot/index.html"
          $indexContent = Get-Content $indexPath -Raw
          $indexContent = $indexContent -replace '<base href="/" />', '<base href="/snake-game/" />'
          Set-Content -Path $indexPath -Value $indexContent -NoNewline
          Copy-Item $indexPath "publish/wwwroot/404.html"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
