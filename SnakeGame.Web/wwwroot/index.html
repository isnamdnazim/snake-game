<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game (Web)</title>
    <base href="/" />
    <style>
      html,
      body,
      #app {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
        font-family:
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          sans-serif;
      }

      body {
        background:
          radial-gradient(
            circle at top,
            rgba(78, 205, 196, 0.14),
            transparent 34%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(255, 230, 109, 0.1),
            transparent 30%
          ),
          linear-gradient(135deg, #0f0f1e 0%, #121225 45%, #1a1a2e 100%);
      }

      #app {
        display: flex;
        align-items: stretch;
        justify-content: center;
        min-height: 100vh;
      }

      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        color: #ffffff;
        animation: fadeIn 0.45s ease-out;
      }

      .loading-badge {
        width: 92px;
        height: 92px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        background: linear-gradient(
          135deg,
          rgba(78, 205, 196, 0.18),
          rgba(94, 242, 223, 0.28)
        );
        border: 1px solid rgba(78, 205, 196, 0.35);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        animation: pulse 1.6s ease-in-out infinite;
      }

      .loading-title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.4px;
        margin: 0;
      }

      .loading-subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.72);
        margin: 0;
      }

      .loading-dots {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        height: 18px;
      }

      .loading-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4ecdc4;
        box-shadow: 0 0 12px rgba(78, 205, 196, 0.35);
        animation: bounce 1.1s ease-in-out infinite;
      }

      .loading-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .loading-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.55;
        }
        40% {
          transform: translateY(-8px);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-screen" aria-label="Loading Snake Game">
        <div class="loading-badge">🐍</div>
        <h1 class="loading-title">Snake Game</h1>
        <p class="loading-subtitle">Preparing the board...</p>
        <div class="loading-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>
